<div class="h-full flex flex-col">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      {{ isEditMode ? '编辑模型配置' : '创建模型配置' }}
    </h1>
    <button
      mat-raised-button
      (click)="onCancel()"
      class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50"
    >
      取消
    </button>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden flex-1">
    <div *ngIf="loading()" class="p-8 text-center">
      <mat-spinner></mat-spinner>
      <p class="mt-4">加载中...</p>
    </div>
    <form *ngIf="!loading()" [formGroup]="configForm" (ngSubmit)="onSubmit()" class="p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <mat-form-field class="w-full">
            <mat-label>提供商</mat-label>
            <mat-select formControlName="provider_name">
              <mat-option *ngFor="let option of providerOptions" [value]="option.value">
                {{ option.label }}
              </mat-option>
            </mat-select>
            <mat-error *ngIf="configForm.get('provider_name')?.hasError('required')">
              提供商是必填项
            </mat-error>
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>模型名称</mat-label>
            <input matInput formControlName="model_name" placeholder="例如: gpt-4o">
            <mat-error *ngIf="configForm.get('model_name')?.hasError('required')">
              模型名称是必填项
            </mat-error>
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>API 端点</mat-label>
            <input matInput formControlName="api_endpoint" placeholder="例如: https://api.openai.com/v1">
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>API 版本</mat-label>
            <input matInput formControlName="api_version" placeholder="例如: v1">
          </mat-form-field>
        </div>

        <div>
          <mat-form-field class="w-full">
            <mat-label>最大 Token 数</mat-label>
            <input matInput formControlName="max_tokens" type="number">
            <mat-error *ngIf="configForm.get('max_tokens')?.hasError('required')">
              最大 Token 数是必填项
            </mat-error>
            <mat-error *ngIf="configForm.get('max_tokens')?.hasError('min')">
              最大 Token 数必须大于 0
            </mat-error>
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>Temperature</mat-label>
            <input matInput formControlName="temperature" type="number" step="0.1">
            <mat-error *ngIf="configForm.get('temperature')?.hasError('required')">
              Temperature 是必填项
            </mat-error>
            <mat-error *ngIf="configForm.get('temperature')?.hasError('min') || configForm.get('temperature')?.hasError('max')">
              Temperature 必须在 0 到 2 之间
            </mat-error>
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>超时时间（秒）</mat-label>
            <input matInput formControlName="timeout_seconds" type="number">
            <mat-error *ngIf="configForm.get('timeout_seconds')?.hasError('required')">
              超时时间是必填项
            </mat-error>
            <mat-error *ngIf="configForm.get('timeout_seconds')?.hasError('min')">
              超时时间必须大于 0
            </mat-error>
          </mat-form-field>

          <mat-form-field class="w-full">
            <mat-label>优先级</mat-label>
            <input matInput formControlName="priority" type="number">
            <mat-error *ngIf="configForm.get('priority')?.hasError('required')">
              优先级是必填项
            </mat-error>
            <mat-error *ngIf="configForm.get('priority')?.hasError('min')">
              优先级必须大于等于 0
            </mat-error>
          </mat-form-field>
        </div>
      </div>

      <div class="mt-6">
        <mat-form-field class="w-full">
          <mat-label>API Key</mat-label>
          <input matInput formControlName="api_key" placeholder="请输入 API Key" type="password">
          <mat-hint>留空则保持原有 API Key 不变</mat-hint>
        </mat-form-field>
      </div>

      <div class="mt-6">
        <mat-slide-toggle formControlName="is_active" color="primary">
          启用此模型配置
        </mat-slide-toggle>
      </div>

      <div class="mt-8 flex justify-end space-x-4">
        <button
          mat-raised-button
          type="submit"
          color="primary"
          [disabled]="configForm.invalid || isLoading()"
          class="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 disabled:opacity-50"
        >
          {{ isEditMode ? '更新' : '创建' }}
        </button>
      </div>
    </form>
  </div>
</div>
