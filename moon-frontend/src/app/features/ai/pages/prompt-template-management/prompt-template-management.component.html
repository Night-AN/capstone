<div class="h-full flex flex-col">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">提示模板管理</h1>
    <div class="flex space-x-4">
      <div class="relative">
        <input
          type="text"
          placeholder="搜索提示模板..."
          [(ngModel)]="searchKeyword"
          (input)="applyFilter()"
          class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>
      <button
        mat-raised-button
        color="primary"
        (click)="createPromptTemplate()"
        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
      >
        创建模板
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden flex-1">
    <table mat-table [dataSource]="dataSource" matSort class="w-full h-full">
      <ng-container matColumnDef="template_name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>模板名称</th>
        <td mat-cell *matCellDef="let element">{{ element.template_name }}</td>
      </ng-container>

      <ng-container matColumnDef="template_type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>模板类型</th>
        <td mat-cell *matCellDef="let element">{{ element.template_type }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>描述</th>
        <td mat-cell *matCellDef="let element">{{ element.description }}</td>
      </ng-container>

      <ng-container matColumnDef="is_active">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>状态</th>
        <td mat-cell *matCellDef="let element">
          <span [class]="element.is_active ? 'text-green-600' : 'text-gray-400'">
            {{ element.is_active ? '启用' : '禁用' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let element">
          <div class="flex space-x-2">
            <button
              mat-icon-button
              color="primary"
              (click)="editPromptTemplate(element.template_id)"
              aria-label="编辑"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="deletePromptTemplate(element.template_id)"
              aria-label="删除"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
  </div>
</div>
