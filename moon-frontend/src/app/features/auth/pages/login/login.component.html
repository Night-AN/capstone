<div class="min-h-screen flex bg-gray-100">
  <div class="hidden md:block w-2/3 h-screen">
    <img src="/images/login-bg.jpg" alt="Login" class="w-full h-full object-cover" />
  </div>

  <div class="w-full md:w-1/3 h-screen flex items-center justify-center p-8">
    <mat-card class="w-full max-w-sm">
      <mat-card-header class="justify-center pb-4">
        <div class="text-center">
          <h1 class="text-5xl font-bold text-gray-800 mb-2">Moon</h1>
          <h2 class="text-2xl text-gray-600">用户登录</h2>
        </div>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="loginForm" class="space-y-6">
          <mat-form-field class="w-full" appearance="outline">
            <mat-label>邮箱</mat-label>
            <mat-icon matPrefix>email</mat-icon>
            <input matInput formControlName="email" required email>
            @if (loginForm.get('email')?.hasError('required')) {
              <mat-error>
                邮箱是必填项
              </mat-error>
            }
            @if (loginForm.get('email')?.hasError('email')) {
              <mat-error>
                请输入有效的邮箱地址
              </mat-error>
            }
          </mat-form-field>
          
          <mat-form-field class="w-full" appearance="outline">
            <mat-label>密码</mat-label>
            <mat-icon matPrefix>lock</mat-icon>
            <input matInput type="password" formControlName="password" required>
            @if (loginForm.get('password')?.hasError('required')) {
              <mat-error>
                密码是必填项
              </mat-error>
            }
          </mat-form-field>
          
          <button 
            mat-raised-button 
            color="primary" 
            class="w-full" 
            (click)="onLogin()"
            [disabled]="!loginForm.valid"
          >
            <mat-icon>login</mat-icon>
            登录
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions>
        <div class="w-full p-4 bg-blue-50 rounded-lg border border-blue-200 text-center">
          <p class="text-sm text-gray-700 mb-2">还没有账户？</p>
          <button 
            mat-stroked-button 
            color="primary" 
            class="w-full"
            (click)="goToRegister()"
          >
            <mat-icon>person_add</mat-icon>
            立即注册新账户
          </button>
        </div>
      </mat-card-actions>
      <mat-card-footer class="mt-4 pt-6 border-t border-gray-200 text-center text-gray-500 text-xs">
        &copy;2026 Moon. All rights reserved.
      </mat-card-footer>
    </mat-card>
  </div>
</div>
