<div class="bg-white rounded-lg shadow overflow-hidden">
  <div class="p-6 border-b border-gray-200">
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold text-gray-800">组织管理</h2>
      <button mat-raised-button color="primary" (click)="createOrganization()" [disabled]="loading()">
        创建组织
      </button>
    </div>
    <div class="mt-4">
      <mat-form-field class="w-full">
        <mat-label>搜索组织</mat-label>
        <input matInput type="text" [(ngModel)]="searchKeyword" (input)="applyFilter()" [disabled]="loading()">
      </mat-form-field>
    </div>
  </div>
  @if (loading()) {
    <div class="p-8 flex justify-center items-center">
      <mat-spinner></mat-spinner>
      <span class="ml-4 text-gray-600">加载中...</span>
    </div>
  } @else {
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="dataSource" matSort class="w-full">
        <!-- 名称列 -->
        <ng-container matColumnDef="organization_name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>名称</th>
          <td mat-cell *matCellDef="let organization">{{ organization.organization_name }}</td>
        </ng-container>

        <!-- 代码列 -->
        <ng-container matColumnDef="organization_code">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>代码</th>
          <td mat-cell *matCellDef="let organization">{{ organization.organization_code }}</td>
        </ng-container>

        <!-- 标志列 -->
        <ng-container matColumnDef="organization_flag">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>状态</th>
          <td mat-cell *matCellDef="let organization">{{ organization.organization_flag }}</td>
        </ng-container>

        <!-- 创建时间列 -->
        <ng-container matColumnDef="created_at">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>创建时间</th>
          <td mat-cell *matCellDef="let organization">{{ organization.created_at }}</td>
        </ng-container>

        <!-- 操作列 -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>操作</th>
          <td mat-cell *matCellDef="let organization" class="flex space-x-2">
            <button mat-icon-button color="primary" (click)="viewOrganization(organization.organization_id)" [disabled]="loading()">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="accent" (click)="editOrganization(organization.organization_id)" [disabled]="loading()">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="accent" (click)="assignRoleToOrganization(organization.organization_id)" [disabled]="loading()">
              <mat-icon>assignment_ind</mat-icon>
            </button>
            <button mat-icon-button color="accent" (click)="viewOrganizationRoles(organization.organization_id)" [disabled]="loading()">
              <mat-icon>assignment</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="moveOrganization(organization.organization_id)" [disabled]="loading()">
              <mat-icon>swap_vert</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteOrganization(organization.organization_id)" [disabled]="loading()">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
  }
</div>
