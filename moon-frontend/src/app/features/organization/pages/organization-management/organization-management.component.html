<div class="h-full flex flex-col bg-white rounded-lg shadow overflow-hidden">
  <div class="p-6 border-b border-gray-200">
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold text-gray-800">组织管理</h2>
      <button mat-raised-button color="primary" (click)="createOrganization()" [disabled]="loading()">
        创建组织
      </button>
    </div>
    <div class="mt-4">
      <mat-form-field class="w-full">
        <mat-label>搜索组织</mat-label>
        <input matInput type="text" [(ngModel)]="searchKeyword" (input)="applyFilter()" [disabled]="loading()">
      </mat-form-field>
    </div>
  </div>
  @if (loading()) {
    <div class="p-8 flex justify-center items-center">
      <mat-spinner></mat-spinner>
      <span class="ml-4 text-gray-600">加载中...</span>
    </div>
  } @else {
    <div class="overflow-x-auto flex-1 p-4">
      <div class="organization-tree">
        <ng-container *ngFor="let organization of organizations">
          <app-organization-tree-node 
            [organization]="organization"
            [loading]="loading()"
            (view)="viewOrganization($event)"
            (edit)="editOrganization($event)"
            (delete)="deleteOrganization($event)"
          ></app-organization-tree-node>
        </ng-container>
      </div>
    </div>
  }
</div>
