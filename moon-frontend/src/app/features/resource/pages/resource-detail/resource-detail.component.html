<div class="bg-white rounded-lg shadow overflow-hidden">
  @if (loading()) {
    <div class="p-8 text-center">
      <mat-spinner></mat-spinner>
      <p class="mt-4">加载中...</p>
    </div>
  } @else if (resource()) {
    <div class="p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-semibold text-gray-800">资源详情</h2>
        <div class="space-x-2">
          <button mat-raised-button color="primary" (click)="editResource()">
            编辑资源
          </button>
          <button mat-raised-button color="warn" (click)="deleteResource()">
            删除资源
          </button>
          <button mat-raised-button (click)="backToList()">
            返回列表
          </button>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">资源ID</label>
            <p class="text-gray-800">{{ resource()?.resource_id }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">资源名称</label>
            <p class="text-gray-800">{{ resource()?.name }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">资源描述</label>
            <p class="text-gray-800">{{ resource()?.description }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
            <p class="text-gray-800">{{ resource()?.created_at }}</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">更新时间</label>
            <p class="text-gray-800">{{ resource()?.updated_at }}</p>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="p-8 text-center">
      <p class="text-red-500">资源不存在</p>
      <button mat-raised-button (click)="backToList()" class="mt-4">
        返回列表
      </button>
    </div>
  }
</div>
