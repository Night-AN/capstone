<div class="bg-white rounded-lg shadow overflow-hidden">
  <div class="p-6 border-b border-gray-200">
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold text-gray-800">资源管理</h2>
      <button mat-raised-button color="primary" (click)="createResource()">
        创建资源
      </button>
    </div>
    <div class="mt-4">
      <mat-form-field class="w-full">
        <mat-label>搜索资源</mat-label>
        <input matInput type="text" [(ngModel)]="searchKeyword" (input)="applyFilter()">
      </mat-form-field>
    </div>
  </div>
  <div class="overflow-x-auto">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">
      <!-- 名称列 -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>名称</th>
        <td mat-cell *matCellDef="let resource">{{ resource.name }}</td>
      </ng-container>

      <!-- 描述列 -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>描述</th>
        <td mat-cell *matCellDef="let resource">{{ resource.description }}</td>
      </ng-container>

      <!-- 创建时间列 -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>创建时间</th>
        <td mat-cell *matCellDef="let resource">{{ resource.created_at }}</td>
      </ng-container>

      <!-- 操作列 -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let resource" class="flex space-x-2">
          <button mat-icon-button color="primary" (click)="viewResource(resource.resource_id)">
            <mat-icon>visibility</mat-icon>
          </button>
          <button mat-icon-button color="accent" (click)="editResource(resource.resource_id)" [disabled]="resource.sensitive_flag">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteResource(resource.resource_id)" [disabled]="resource.sensitive_flag">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
  <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
</div>
