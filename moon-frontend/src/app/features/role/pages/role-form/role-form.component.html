<div class="h-full flex flex-col">
  <div class="flex-1">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-900">{{ isEditMode ? 'Edit Role' : 'Create Role' }}</h1>
      <button 
        mat-raised-button 
        color="primary"
        (click)="onCancel()"
        class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md flex items-center gap-2"
      >
        <mat-icon>arrow_back</mat-icon>
        {{ isEditMode ? 'Back to Detail' : 'Back to List' }}
      </button>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <form [formGroup]="roleForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Role Name -->
        <div>
          <mat-form-field class="w-full">
            <mat-label>Role Name</mat-label>
            <input 
              matInput 
              formControlName="role_name" 
              placeholder="Enter role name"
              required
            >
            <mat-error *ngIf="roleForm.get('role_name')?.hasError('required')">
              Role name is required
            </mat-error>
          </mat-form-field>
        </div>

        <!-- Description -->
        <div>
          <mat-form-field class="w-full">
            <mat-label>Description</mat-label>
            <textarea 
              matInput 
              formControlName="description" 
              placeholder="Enter role description"
              rows="3"
            ></textarea>
          </mat-form-field>
        </div>

        <!-- Sensitive Flag -->
        <div class="flex items-center">
          <input 
            type="checkbox" 
            formControlName="sensitive_flag"
            id="sensitive_flag"
            class="w-4 h-4 text-blue-600 rounded"
          >
          <label for="sensitive_flag" class="ml-2 text-gray-700">
            Sensitive Role
          </label>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-3">
          <button 
            type="submit" 
            mat-raised-button 
            color="primary"
            [disabled]="roleForm.invalid || loading()"
            class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md flex-1 flex items-center justify-center gap-2"
          >
            <mat-icon *ngIf="!loading()">{{ isEditMode ? 'save' : 'add' }}</mat-icon>
            <mat-spinner *ngIf="loading()" diameter="20"></mat-spinner>
            {{ isEditMode ? 'Update Role' : 'Create Role' }}
          </button>
          <button 
            type="button" 
            mat-raised-button 
            (click)="onCancel()"
            [disabled]="loading()"
            class="bg-gray-600 hover:bg-gray-700 text-white py-2 px-4 rounded-md"
          >
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- Error State -->
    <div *ngIf="error()" class="bg-red-50 border border-red-200 rounded-md p-4">
      <div class="flex items-center">
        <mat-icon class="text-red-500 mr-2">error_outline</mat-icon>
        <h3 class="text-red-800 font-medium">Error</h3>
      </div>
      <p class="mt-2 text-red-700">{{ error() }}</p>
    </div>
  </div>
</div>
