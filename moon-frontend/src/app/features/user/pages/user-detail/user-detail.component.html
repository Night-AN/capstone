<div class="container mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">用户详情</h1>
    <div class="flex space-x-4">
      <button
        mat-raised-button
        color="primary"
        (click)="editUser()"
        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
      >
        编辑
      </button>
      <button
        mat-raised-button
        color="warn"
        (click)="deleteUser()"
        class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-opacity-50"
      >
        删除
      </button>
      <button
        mat-raised-button
        (click)="backToList()"
        class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-opacity-50"
      >
        返回列表
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    @if (loading()) {
      <div class="p-8 text-center">
        <mat-spinner></mat-spinner>
        <p class="mt-4">加载中...</p>
      </div>
    } @else if (user()) {
      <div class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">用户ID</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.user_id }}</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">昵称</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.nickname }}</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.full_name }}</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.email }}</p>
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">创建时间</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.created_at | date: 'yyyy-MM-dd HH:mm:ss' }}</p>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">更新时间</label>
              <p class="px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">{{ user()?.updated_at | date: 'yyyy-MM-dd HH:mm:ss' }}</p>
            </div>
          </div>
        </div>
      </div>
    } @else {
      <div class="p-8 text-center">
        <p class="text-red-500">用户不存在</p>
      </div>
    }
  </div>
</div>
