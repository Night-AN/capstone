<div class="container mx-auto px-4 py-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">用户管理</h1>
    <div class="flex space-x-4">
      <div class="relative">
        <input
          type="text"
          placeholder="搜索用户..."
          [(ngModel)]="searchKeyword"
          (input)="applyFilter()"
          class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        >
      </div>
      <button
        mat-raised-button
        color="primary"
        (click)="createUser()"
        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50"
      >
        创建用户
      </button>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table mat-table [dataSource]="dataSource" matSort class="w-full">
      <!-- Nickname Column -->
      <ng-container matColumnDef="nickname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>昵称</th>
        <td mat-cell *matCellDef="let element">{{ element.nickname }}</td>
      </ng-container>

      <!-- Full Name Column -->
      <ng-container matColumnDef="full_name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>姓名</th>
        <td mat-cell *matCellDef="let element">{{ element.full_name }}</td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>邮箱</th>
        <td mat-cell *matCellDef="let element">{{ element.email }}</td>
      </ng-container>

      <!-- Created At Column -->
      <ng-container matColumnDef="created_at">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>创建时间</th>
        <td mat-cell *matCellDef="let element">{{ element.created_at | date }}</td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let element">
          <div class="flex space-x-2">
            <button
              mat-icon-button
              color="primary"
              (click)="viewUser(element.user_id)"
              aria-label="查看"
            >
              <mat-icon>visibility</mat-icon>
            </button>
            <button
              mat-icon-button
              color="accent"
              (click)="editUser(element.user_id)"
              aria-label="编辑"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="primary"
              (click)="assignRoleToUser(element.user_id)"
              aria-label="分配角色"
            >
              <mat-icon>assignment_ind</mat-icon>
            </button>
            <button
              mat-icon-button
              color="primary"
              (click)="viewUserRoles(element.user_id)"
              aria-label="查看角色"
            >
              <mat-icon>assignment</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              (click)="deleteUser(element.user_id)"
              aria-label="删除"
            >
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [pageSizeOptions]="[5, 10, 25, 100]"
      pageSize="10"
      showFirstLastButtons
      aria-label="分页控件"
    ></mat-paginator>
  </div>
</div>
