<div class="file-page">
  <!-- 标题行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <h2>文件管理</h2>
    </div>
  </div>

  <!-- 查询行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <div class="search-area">
        <div nz-row [nzGutter]="[16, 16]">
          <div nz-col nzSpan="12">
            <nz-input-group nzSearch [nzAddOnAfter]="searchButton">
              <input type="text" nz-input placeholder="搜索文件名" [(ngModel)]="searchValue" />
            </nz-input-group>
            <ng-template #searchButton>
              <button nz-button nzType="primary" nzSearch (click)="searchFiles()">
                <i nz-icon nzType="search"></i>
              </button>
            </ng-template>
          </div>
          <div nz-col nzSpan="12">
            <div nz-row [nzGutter]="[8, 8]">
              <div nz-col nzSpan="8">
                <nz-select [(ngModel)]="searchType" placeholder="选择文件类型">
                  <nz-option nzValue="" nzLabel="全部类型"></nz-option>
                  <nz-option nzValue="image" nzLabel="图片"></nz-option>
                  <nz-option nzValue="document" nzLabel="文档"></nz-option>
                  <nz-option nzValue="video" nzLabel="视频"></nz-option>
                  <nz-option nzValue="other" nzLabel="其他"></nz-option>
                </nz-select>
              </div>
              <div nz-col nzSpan="8">
                <button nz-button nzType="primary" (click)="searchFiles()">
                  <i nz-icon nzType="search"></i>
                  查询
                </button>
                <button nz-button (click)="resetSearch()" style="margin-left: 8px;">
                  <i nz-icon nzType="reload"></i>
                  重置
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 功能行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <div class="function-area">
        <button nz-button nzType="primary" (click)="openCreateModal()">
          <i nz-icon nzType="plus"></i>
          新建文件
        </button>
      </div>
    </div>
  </div>

  <!-- 列表行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <nz-table #fileTable [nzData]="fileList" [nzLoading]="loading" nzBordered>
        <thead>
          <tr>
            <th nzWidth="200px">文件名</th>
            <th nzWidth="120px">文件类型</th>
            <th nzWidth="120px">文件大小</th>
            <th nzWidth="160px">创建时间</th>
            <th nzWidth="160px">更新时间</th>
            <th nzWidth="120px">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (file of fileList; track file.id) {
          <tr>
            <td>{{ file.fileName }}</td>
            <td>{{ file.fileType }}</td>
            <td>{{ formatFileSize(file.fileSize) }}</td>
            <td>{{ file.createdAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
            <td>{{ file.updatedAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
            <td>
              <button nz-button nzType="primary" nzSize="small" (click)="openUpdateModal(file)">
                <i nz-icon nzType="edit"></i>
                编辑
              </button>
              <button nz-button nzType="dashed" nzSize="small" (click)="deleteFile(file.id, file.fileName)" style="margin-left: 8px;">
                <i nz-icon nzType="delete"></i>
                删除
              </button>
            </td>
          </tr>
          }
        </tbody>
        <tfoot>
          <tr>
            <td colspan="6">
              <nz-pagination
                [nzTotal]="totalCount"
                [nzPageSize]="pageSize"
                [nzPageIndex]="currentPage"
                (nzPageIndexChange)="pageIndexChange($event)"
                (nzPageSizeChange)="pageSizeChange($event)"
                nzShowSizeChanger
                nzShowQuickJumper
              ></nz-pagination>
            </td>
          </tr>
        </tfoot>
      </nz-table>
    </div>
  </div>

  <!-- 创建文件弹窗 -->
  <nz-modal
    [(nzVisible)]="createModalVisible"
    nzTitle="新建文件"
    nzWidth="600px"
    (nzOnCancel)="createModalVisible = false"
    (nzOnOk)="handleCreateFile()"
  >
    <ng-template #modalContent>
        <form nz-form [formGroup]="createForm">
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件名</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件名">
                    <input nz-input formControlName="fileName" placeholder="请输入文件名" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件类型</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件类型">
                    <input nz-input formControlName="fileType" placeholder="请输入文件类型" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件大小</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件大小">
                    <input nz-input type="number" formControlName="fileSize" placeholder="请输入文件大小(字节)" />
                </nz-form-control>
            </nz-form-item>
        </form>
    </ng-template>
  </nz-modal>

  <!-- 更新文件弹窗 -->
  <nz-modal
    [(nzVisible)]="updateModalVisible"
    nzTitle="编辑文件"
    nzWidth="600px"
    (nzOnCancel)="updateModalVisible = false"
    (nzOnOk)="handleUpdateFile()"
  >
    <ng-template #modalContent>
        <form nz-form [formGroup]="updateForm">
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件名</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件名">
                    <input nz-input formControlName="fileName" placeholder="请输入文件名" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件类型</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件类型">
                    <input nz-input formControlName="fileType" placeholder="请输入文件类型" />
                </nz-form-control>
            </nz-form-item>
            <nz-form-item>
                <nz-form-label [nzSpan]="6" nzRequired>文件大小</nz-form-label>
                <nz-form-control [nzSpan]="14" nzErrorTip="请输入文件大小">
                    <input nz-input type="number" formControlName="fileSize" placeholder="请输入文件大小(字节)" />
                </nz-form-control>
            </nz-form-item>
        </form>
    </ng-template>
  </nz-modal>
</div>
