<div class="file-page">
  <nz-card>
    <div class="card-header">
      <h2>文件管理</h2>
      <div class="search-area">
        <input nz-input placeholder="搜索文件名" [(ngModel)]="searchValue" (input)="searchFiles()" />
        <button nz-button nzType="primary" (click)="openCreateModal()">新建文件</button>
      </div>
    </div>
    <div class="file-management">
      <!-- 文件列表 -->
      <nz-table #fileTable [nzData]="fileList" [nzLoading]="loading" nzBordered>
        <thead>
          <tr>
            <th>文件名</th>
            <th>文件类型</th>
            <th>文件大小</th>
            <th>创建时间</th>
            <th>更新时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          @for (item of fileList; track item.id) {
          <tr>
            <td>{{ item.fileName }}</td>
            <td>{{ item.fileType }}</td>
            <td>{{ formatFileSize(item.fileSize) }}</td>
            <td>{{ item.createdAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
            <td>{{ item.updatedAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
            <td>
              <button nz-button nzSize="small" nzType="primary" (click)="openUpdateModal(item)">
                <span nz-icon nzType="edit"></span>
                编辑
              </button>
              <button nz-button nzSize="small" nzType="dashed" (click)="deleteFile(item.id, item.fileName)">
                <span nz-icon nzType="delete"></span>
                删除
              </button>
            </td>
          </tr>
          }
        </tbody>
        <tfoot>
          <tr>
            <td colspan="6">
              <nz-pagination
                [nzTotal]="totalCount"
                [nzPageSize]="pageSize"
                [nzPageIndex]="currentPage"
                (nzPageIndexChange)="pageIndexChange($event)"
                (nzPageSizeChange)="pageSizeChange($event)"
                nzShowSizeChanger
                nzShowQuickJumper
              ></nz-pagination>
            </td>
          </tr>
        </tfoot>
      </nz-table>
    </div>
  </nz-card>
</div>

<!-- 创建文件弹窗 -->
<nz-modal
  [(nzVisible)]="createModalVisible"
  nzTitle="新建文件"
  nzWidth="600px"
  (nzOnCancel)="createModalVisible = false"
  (nzOnOk)="handleCreateFile()"
>
  <div class="modal-content">
    <form nz-form [formGroup]="createForm">
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件名</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input formControlName="fileName" placeholder="请输入文件名" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件类型</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input formControlName="fileType" placeholder="请输入文件类型" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件大小</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input type="number" formControlName="fileSize" placeholder="请输入文件大小(字节)" />
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>
</nz-modal>

<!-- 更新文件弹窗 -->
<nz-modal
  [(nzVisible)]="updateModalVisible"
  nzTitle="编辑文件"
  nzWidth="600px"
  (nzOnCancel)="updateModalVisible = false"
  (nzOnOk)="handleUpdateFile()"
>
  <div class="modal-content">
    <form nz-form [formGroup]="updateForm">
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件名</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input formControlName="fileName" placeholder="请输入文件名" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件类型</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input formControlName="fileType" placeholder="请输入文件类型" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-label [nzSpan]="6">文件大小</nz-form-label>
        <nz-form-control [nzSpan]="14">
          <input nz-input type="number" formControlName="fileSize" placeholder="请输入文件大小(字节)" />
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>
</nz-modal>
