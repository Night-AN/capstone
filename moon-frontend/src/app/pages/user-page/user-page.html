<div class="user-page">
  <!-- 标题行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <h2>用户管理</h2>
    </div>
  </div>

  <!-- 查询行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <div class="search-area">
        <div nz-row [nzGutter]="[16, 16]">
          <div nz-col nzSpan="8">
            <nz-input-group nzSearch [nzAddOnAfter]="searchButton">
              <input type="text" nz-input [(ngModel)]="searchName" placeholder="请输入姓名" />
            </nz-input-group>
            <ng-template #searchButton>
              <button nz-button nzType="primary" nzSearch (click)="searchUsers()">
                <i nz-icon nzType="search"></i>
              </button>
            </ng-template>
          </div>
          <div nz-col nzSpan="8">
            <nz-input-group nzSearch [nzAddOnAfter]="searchEmailButton">
              <input type="text" nz-input [(ngModel)]="searchEmail" placeholder="请输入邮箱" />
            </nz-input-group>
            <ng-template #searchEmailButton>
              <button nz-button nzType="primary" nzSearch (click)="searchUsers()">
                <i nz-icon nzType="search"></i>
              </button>
            </ng-template>
          </div>
          <div nz-col nzSpan="8">
            <div nz-row [nzGutter]="[8, 8]">
              <div nz-col nzSpan="12">
                <nz-range-picker [(ngModel)]="dateRange" nzFormat="yyyy-MM-dd" nzPlaceHolder="['开始日期', '结束日期']">
                </nz-range-picker>
              </div>
              <div nz-col nzSpan="12">
                <button nz-button nzType="primary" (click)="searchUsers()">
                  <i nz-icon nzType="search"></i>
                  查询
                </button>
                <button nz-button (click)="resetSearch()" style="margin-left: 8px;">
                  <i nz-icon nzType="reload"></i>
                  重置
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 功能行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <div class="function-area">
        <button nz-button nzType="primary" (click)="createUser()">
          <i nz-icon nzType="plus"></i>
          创建用户
        </button>
      </div>
    </div>
  </div>

  <!-- 列表行 -->
  <div nz-row [nzGutter]="[16, 16]">
    <div nz-col nzSpan="24">
      <nz-table [nzData]="users" nzBordered [nzLoading]="loading">
        <thead>
          <tr>
            <th nzWidth="80px">ID</th>
            <th nzWidth="120px">昵称</th>
            <th nzWidth="120px">姓名</th>
            <th nzWidth="200px">邮箱</th>
            <th nzWidth="160px">创建时间</th>
            <th nzWidth="120px">操作</th>
          </tr>
        </thead>
        <tbody>
          @for (item of users; track item.id) {
          <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.nickname }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.email }}</td>
            <td>{{ item.createdAt | date: 'yyyy-MM-dd HH:mm:ss' }}</td>
            <td>
              <button nz-button nzType="primary" nzSize="small" (click)="editUser(item)">编辑</button>
              <button nz-button nzType="dashed" nzSize="small" (click)="deleteUser(item.id)" style="margin-left: 8px;">删除</button>
            </td>
          </tr>
          }
        </tbody>
      </nz-table>
    </div>
  </div>

  <!-- 弹窗 -->
  <nz-modal [(nzVisible)]="visible" [nzTitle]="modalTitle" (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()"
      [nzContent]="modalContent">
      <ng-template #modalContent>
          <form nz-form [formGroup]="userForm">
              <nz-form-item>
                  <nz-form-label nzRequired>昵称</nz-form-label>
                  <nz-form-control nzErrorTip="请输入昵称">
                      <input nz-input formControlName="nickname" placeholder="请输入昵称" />
                  </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                  <nz-form-label nzRequired>姓名</nz-form-label>
                  <nz-form-control nzErrorTip="请输入姓名">
                      <input nz-input formControlName="fullname" placeholder="请输入姓名" />
                  </nz-form-control>
              </nz-form-item>
              <nz-form-item>
                  <nz-form-label nzRequired>邮箱</nz-form-label>
                  <nz-form-control nzErrorTip="请输入有效的邮箱地址">
                      <input nz-input formControlName="email" placeholder="请输入邮箱" />
                  </nz-form-control>
              </nz-form-item>
          </form>
      </ng-template>
  </nz-modal>
</div>
