@if (state$ | async; as state) {
  @if (state.displaying.length > 0) {
    <div class="fixed top-1/4 left-1/2 transform -translate-x-1/2 z-50 space-y-2">
      @for (n of state.displaying; track n.id) {
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 
                    p-4 w-full max-w-md flex items-start gap-3 transform transition-all duration-300 ease-out
                    relative overflow-hidden"> 
          <fa-icon [icon]="faExclamationCircle" 
                   class="text-xl shrink-0 mt-0.5"
                   [class.text-green-500]="n.type === 'success'"
                   [class.text-red-500]="n.type === 'error'"
                   [class.text-yellow-500]="n.type === 'warning'"
                   [class.text-blue-500]="n.type === 'info'">
          </fa-icon>

          <div class="flex-1 overflow-hidden min-w-0 pr-8">
            @if (n.title) {
              <h4 class="font-semibold text-gray-900 dark:text-gray-100 text-lg mb-1 truncate">
                {{ n.title }}
              </h4>
            }@else {
              <h4 class="font-semibold text-gray-900 dark:text-gray-100 text-lg mb-1 truncate">
                Notification
              </h4>
            }
            
            <p class="text-gray-700 dark:text-gray-300 text-sm wrap-break-words whitespace-pre-wrap">
              {{ n.message }}
            </p>
          </div>

          <button (click)="removeNotification(n.id!)"
                  class="absolute top-2 right-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 
                         p-1 rounded transition-colors">
            <fa-icon [icon]="fax" class="text-lg"></fa-icon>
          </button>
        </div>
      }
    </div>
  }

  @if (state.waiting.length > 0) {
    <div class="fixed bottom-4 right-4 bg-gray-800 text-white px-3 py-1 rounded-full text-sm">
      {{ state.waiting.length }}
    </div>
  }
}
