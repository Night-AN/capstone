<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      采购验收管理
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">采购验收管理</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="container">
    <h2>功能菜单</h2>
    <ion-list>
      <ion-item>
        <ion-button expand="full" color="primary" size="large" (click)="goToProcurement()">
          采购记录管理
        </ion-button>
      </ion-item>
      <ion-item>
        <ion-button expand="full" color="secondary" size="large" (click)="goToAcceptance()">
          验收记录管理
        </ion-button>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
